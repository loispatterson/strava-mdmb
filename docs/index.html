      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

o tell.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENow before you judge me, I am a very long way from being any kind of elite althlete. Think active person with a lot of other things going on. All I know is that I am going further, I will finish the race and I'm sure training could be improved.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EI thought I would use this goal as an opportunity to see what Marimo is like and code pair with Claude. Also, with all the tools we now have available, why can't the average person get personalised traning for free.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EGoal: are we getting fitter, and how to train better for the race.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f53378e10237b2c7e39791118c37c9c8", "console": [], "id": "emfo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis is the race profile. A lot of up!\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0d1b471cde9bdd3898f88a90e3731c2f", "console": [], "id": "Hstk", "outputs": [{"data": {"application/vnd.vegalite.v6+json": "{\n  \"$schema\": \"https://vega.github.io/schema/vega-lite/v6.4.1.json\",\n  \"config\": {\n    \"view\": {\n      \"continuousHeight\": 300,\n      \"continuousWidth\": 300\n    }\n  },\n  \"datasets\": {\n    \"data-02965f0f6144255d7ebdc97ba0d52e23\": [\n      {\n        \"dist_km\": 0.0,\n        \"ele\": 1039.0,\n        \"label\": \"D\u00e9but du parcours\",\n        \"name\": \"D\u00e9but du parcours \\\"23km du Mont-Blanc\\\"\"\n      },\n      {\n        \"dist_km\": 11.616560000718732,\n        \"ele\": 1369.0,\n        \"label\": \"Ravito de Montroc\",\n        \"name\": \"Ravitaillement de Montroc\"\n      },\n      {\n        \"dist_km\": 12.40300592128096,\n        \"ele\": 1419.0,\n        \"label\": \"Passerelle Col des Montets\",\n        \"name\": \"Passerelle C t;ordinal\u0026#92;\u0026quot;\u0026#92;n    },\u0026#92;n    \u0026#92;\u0026quot;y\u0026#92;\u0026quot;: {\u0026#92;n      \u0026#92;\u0026quot;field\u0026#92;\u0026quot;: \u0026#92;\u0026quot;ascent_m\u0026#92;\u0026quot;,\u0026#92;n      \u0026#92;\u0026quot;title\u0026#92;\u0026quot;: \u0026#92;\u0026quot;Climb (m D+, corrected)\u0026#92;\u0026quot;,\u0026#92;n      \u0026#92;\u0026quot;type\u0026#92;\u0026quot;: \u0026#92;\u0026quot;quantitative\u0026#92;\u0026quot;\u0026#92;n    }\u0026#92;n  },\u0026#92;n  \u0026#92;\u0026quot;height\u0026#92;\u0026quot;: 210,\u0026#92;n  \u0026#92;\u0026quot;mark\u0026#92;\u0026quot;: {\u0026#92;n    \u0026#92;\u0026quot;color\u0026#92;\u0026quot;: \u0026#92;\u0026quot;#e45756\u0026#92;\u0026quot;,\u0026#92;n    \u0026#92;\u0026quot;type\u0026#92;\u0026quot;: \u0026#92;\u0026quot;bar\u0026#92;\u0026quot;\u0026#92;n  },\u0026#92;n  \u0026#92;\u0026quot;title\u0026#92;\u0026quot;: \u0026#92;\u0026quot;Vertical / week\u0026#92;\u0026quot;,\u0026#92;n  \u0026#92;\u0026quot;usermeta\u0026#92;\u0026quot;: {\u0026#92;n    \u0026#92;\u0026quot;embedOptions\u0026#92;\u0026quot;: {}\u0026#92;n  },\u0026#92;n  \u0026#92;\u0026quot;width\u0026#92;\u0026quot;: 360\u0026#92;n}\u0026quot;'\u003E\u003C/marimo-mime-renderer\u003E\u003C/div\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "3104159486e6a66b1f210ee57e2876c2", "console": [], "id": "ecfG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"altitude-correction\"\u003EAltitude correction\u003C/h2\u003E\n\u003Ch3 id=\"why-smooth-the-elevation\"\u003EWhy smooth the elevation?\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EI know that my watch's (Venu 3) barometric altimeter, tends to over-read vertical gain. On some runs it massively overestimates the elevation, so for a few recent efforts I have used Strava's elevation correction to re-adjust this.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIn order to do the analysis properly, I need to make sure I am comparing like for like. That means using a more accurate and consistent elevation source rather than relying only on the watch data.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ETo do this, I re-derive the elevation from each GPS point using the SRTM (Shuttle Radar Topography Mission) digital elevation model (DEM), then recompute the ascent on a fixed distance grid with smoothing. This means the final elevation gain is based on the terrain itself, rather than being affected by how slowly or quickly I was moving.\u003C/span\u003E\n\u003Ch3 id=\"what-is-srtm\"\u003EWhat is SRTM?\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003ESRTM stands for Shuttle Radar Topography Mission. It was a NASA project from February 2000, when the space shuttle Endeavour flew an 11-day mission carrying two radar antennas: one in the cargo bay and one on a 60-metre mast extended out from the shuttle.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe two antennas captured slightly different radar views of the Earth's surface at the same time. By comparing the phase difference between the two radar returns, NASA was able to calculate ground elevation. In simple terms, it created a near-global 3D map of the Earth's surface.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe result was one of the first high-quality global elevation datasets:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ECoverage: around 80% of Earth's land surface, between roughly 60\u00b0 N and 56\u00b0 S\u003C/li\u003E\n\u003Cli\u003EResolution: around 30 m horizontally, also known as 1 arc-second\u003C/li\u003E\n\u003Cli\u003EVertical accuracy: a few metres relative, and around 10 m absolute\u003C/li\u003E\n\u003Cli\u003ELimitations: better on flatter terrain, less accurate in steep mountains where radar shadowing can leave gaps\u003C/li\u003E\n\u003Cli\u003EStatus: still one of the standard free global elevation models, used by many elevation APIs, hiking apps, and elevation correction tools\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EBehind the scenes, I download the relevant SRTM tiles when needed and look up the elevation for each GPS coordinate. These DEM-corrected elevation values are then used to calculate the corrected D+ figure. In effect, the watch's barometric altimeter is being cross-checked against ground elevation from the SRTM dataset.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EHowever, re-deriving elevation from GPS and SRTM still gives one elevation reading per track point, and those readings are not perfectly clean. If I simply summed every tiny rise between points, two types of noise would inflate the total climb:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EGPS jitter\u003C/strong\u003E: the recorded position can wander by a few metres, even when standing still. This means a point can hop between neighbouring SRTM cells and create small fake ups and downs.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EDEM noise\u003C/strong\u003E: SRTM itself is only accurate to within a few metres vertically, so tiny changes between points are not always real terrain changes.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EIf those small ups and downs are summed raw, they can make a real 1,500 m climb look more like 2,000 m (great for the ego). Smoothing the elevation profile over a fixed distance window helps remove this sub-cell noise, so the cumulative gain better reflects the actual terrain rather than the jitter in the data.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe smoothing window is a trade-off. If it is too small, noise still inflates the D+ figure. If it is too large, genuine short climbs and rolling terrain get flattened away. For that reason, \u003Ccode\u003EELEVATION_SMOOTH_M\u003C/code\u003E is calibrated against Strava's corrected elevation figures below.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e127bf071b7b32b81c0b11470d57867e", "console": [], "id": "Pvdt", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"elevation-correction-calibration\"\u003EElevation-correction calibration\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EBest-fit smoothing: \u003Cstrong\u003E275 m\u003C/strong\u003E\n(currently using \u003Ccode\u003EELEVATION_SMOOTH_M = 250\u003C/code\u003E).\nCalibrated on the \u003Cstrong\u003E4\u003C/strong\u003E activities\nStrava elevation-corrected;\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='Pvdt-0' random-id='a964231d-0291-92bd-449d-4b453b85d819'\u003E\u003Cmarimo-table data-initial-value='[]' data-label='null' data-data='\u0026quot;[{\u0026#92;\u0026quot;file\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Afternoon_Run.fit\u0026#92;\u0026quot;,\u0026#92;\u0026quot;watch_m\u0026#92;\u0026quot;:359,\u0026#92;\u0026quot;strava_m\u0026#92;\u0026quot;:359.0,\u0026#92;\u0026quot;corrected\u0026#92;\u0026quot;:false,\u0026#92;\u0026quot;dem_m\u0026#92;\u0026quot;:254},{\u0026#92;\u0026quot;file\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Afternoon_Runwith_Alex.fit\u0026#92;\u0026quot;,\u0026#92;\u0026quot;watch_m\u0026#92;\u0026quot;:235,\u0026#92;\u0026quot;strava_m\u0026#92;\u0026quot;:235.0,\u0026#92;\u0026quot;corrected\u0026#92;\u0026quot;:false,\u0026#92;\u0026quot;dem_m\u0026#92;\u0026quot;:278},{\u0026#92;\u0026quot;file\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Afternoon_trailing_with_Martina_and_Isa.fit\u0026#92;\u0026quot;,\u0026#92;\u0026quot;watch_m\u0026#92;\u0026quot;:614,\u0026#92;\u0026quot;strava_m\u0026#92;\u0026quot;:614.0,\u0026#92;\u0026quot;corrected\u0026#92;\u0026quot;:false,\u0026#92;\u0026quot;dem_m\u0026#92;\u0026quot;:451},{\u0 "console": [], "id": "ZBYS", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"reading-the-pace-vs-terrain-plot\"\u003EReading the pace-vs-terrain plot\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ERaw pace tells me almost nothing about trail fitness. A steep mountain run looks \"slow\" because of the terrain, not necessarily because I am unfit. To understand fitness properly, I need to \u003Cstrong\u003Econtrol for terrain\u003C/strong\u003E.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo I plot every activity since March as:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003Ex \u2014 terrain difficulty\u003C/strong\u003E: climb per km, in m/km, using DEM-corrected elevation.\n  Flat road sits on the left, steep mountain terrain sits on the right.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003Ey \u2014 pace\u003C/strong\u003E: min/km. Lower means faster.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003Ecolour \u2014 date\u003C/strong\u003E, \u003Cstrong\u003Eshape \u2014 activity type\u003C/strong\u003E.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe cloud naturally trends up and to the right: the steeper the terrain gets, the slower I go. That is just the terrain doing its thing, not automatically a sign of fitness.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe actual fitness signal lives \u003Cem\u003Ewithin a vertical slice\u003C/em\u003E of the plot. At a given terrain difficulty, the points sitting \u003Cstrong\u003Elower\u003C/strong\u003E are faster. So if my recent, brighter points sit below the older ones at the same terrain difficulty, that suggests I am getting fitter for that type of terrain.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "841f444b73d0f50e4b1ce9b5adc26cea", "console": [], "id": "aLJB", "outputs": [{"data": {"application/vnd.vegalite.v6+json": "{\n  \"$schema\": \"https://vega uot;quantitative\u0026#92;\u0026quot;\u0026#92;n    },\u0026#92;n    \u0026#92;\u0026quot;y\u0026#92;\u0026quot;: {\u0026#92;n      \u0026#92;\u0026quot;axis\u0026#92;\u0026quot;: {\u0026#92;n        \u0026#92;\u0026quot;labelFontSize\u0026#92;\u0026quot;: 8\u0026#92;n      },\u0026#92;n      \u0026#92;\u0026quot;field\u0026#92;\u0026quot;: \u0026#92;\u0026quot;label\u0026#92;\u0026quot;,\u0026#92;n      \u0026#92;\u0026quot;sort\u0026#92;\u0026quot;: {\u0026#92;n        \u0026#92;\u0026quot;field\u0026#92;\u0026quot;: \u0026#92;\u0026quot;date\u0026#92;\u0026quot;\u0026#92;n      },\u0026#92;n      \u0026#92;\u0026quot;title\u0026#92;\u0026quot;: null,\u0026#92;n      \u0026#92;\u0026quot;type\u0026#92;\u0026quot;: \u0026#92;\u0026quot;nominal\u0026#92;\u0026quot;\u0026#92;n    }\u0026#92;n  },\u0026#92;n  \u0026#92;\u0026quot;height\u0026#92;\u0026quot;: 420,\u0026#92;n  \u0026#92;\u0026quot;mark\u0026#92;\u0026quot;: {\u0026#92;n    \u0026#92;\u0026quot;type\u0026#92;\u0026quot;: \u0026#92;\u0026quot;bar\u0026#92;\u0026quot;\u0026#92;n  },\u0026#92;n  \u0026#92;\u0026quot;title\u0026#92;\u0026quot;: \u0026#92;\u0026quot;HR zones per activity  \u00b7  pooled easy (Z1-Z2) = 26%\u0026#92;\u0026quot;,\u0026#92;n  \u0026#92;\u0026quot;usermeta\u0026#92;\u0026quot;: {\u0026#92;n    \u0026#92;\u0026quot;embedOptions\u0026#92;\u0026quot;: {}\u0026#92;n  },\u0026#92;n  \u0026#92;\u0026quot;width\u0026#92;\u0026quot;: 560\u0026#92;n}\u0026quot;'\u003E\u003C/marimo-mime-renderer\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "15af2f3dc482a32edc0b56b3d5ca581b", "console": [], "id": "AjVT", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"race-readiness-23-km-du-mont-blanc-28-jun-2026\"\u003ERace readiness \u2014 23 km du Mont-Blanc (28 Jun 2026)\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E6 weeks out. Built on \u003Cstrong\u003E39 activities since\n1 March\u003C/strong\u003E \u2014 18 of them runs, full HR + GPS streams.*\u003C/span\u003E\n\u003Ch3 id=\"where-i-stand-so-far\"\u003EWhere I stand so far\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EThe data above tells a fairly clean story:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EMy base is back.\u003C/strong\u003E 2026 Jan\u2013May is \u003Cstrong\u003E+47%\u003C/strong\u003E on the\n  same months in 2025 \u2014 the anaemic patch is well behind me.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EI'm getting fitter, modestly.\u003C/strong\u003E On flat runs my pace-at-fixed-HR is\n  roughly stable, but my most recent run is the best of the set \u2014 speed\n  is just starting to follow the base.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EI've already done a race-sized day\u003C/strong\u003E (Les praz, Montroc, near flegere, crazy path down and back,\n  23.6 km) \u2014 the mountain legs and time-on-feet exist.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EThe single biggest lever from here is the HR-zone balance\u003C/strong\u003E \u2014 see #2.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"the-race-241-km-1680-m-d\"\u003EThe race \u00b7 24.1 km / \u2248 1,680 m D+\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003ENet-uphill, finishing at altitude (Fl\u00e9g\u00e8re, 2,067 m). One\n313 m climb mid-race; then after a fast ~250 m\ndescent the final ~7 km climbs ~480 m to the line. No flat recovery.\u003C/span\u003E\n\u003Ch3 id=\"1-am-i-getting-fitter-base-yes-speed-starting-to\"\u003E1. Am I getting fitter? \u2014 base yes, speed starting to\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EEfficiency:\u003C/strong\u003E on truly flat road runs, speed-per-heartbeat is roughly\n  stable (+0.8% early-March \u2192 now) \u2014 but my \u003Cstrong\u003Emost recent run\n  is the best of the set\u003C/strong\u003E (6.72 min/km at\n  HR 155).\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EVolume:\u003C/strong\u003E 2026 Jan\u2013May is \u003Cstrong\u003E+47%\u003C/strong\u003E vs the same months\n  in 2025 \u2014 a real aerobic base rebuilt.\u003C/li\u003E\n\u003Cli\u003EThe honest read: the base is back; the race-specific speed is the work\n  of the next 6 weeks.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"2-biggest-opportunity-train-easier-25-easy\"\u003E2. Biggest opportunity: train \u003Cem\u003Eeasier\u003C/em\u003E \u2014 \u003Cstrong\u003E25% easy\u003C/strong\u003E\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EAcross every run \u0026amp; hike since March, only \u003Cstrong\u003E25%\u003C/strong\u003E of my time\nis truly easy (Z1\u2013Z2); \u003Cstrong\u003E57%\u003C/strong\u003E sits in Z3\u2013Z4. My flat runs are\nalmost entirely tempo-or-harder. A 24 km mountain race is\na 2.5\u20134 h \u003Cem\u003Eaerobic\u003C/em\u003E effort \u2014 that engine is built slow. I need to shift\nto \u003Cstrong\u003E~80% easy / 20% hard\u003C/strong\u003E. Highest-leverage change on this page.\u003C/span\u003E\n\u003Ch3 id=\"3-volume-trend-building-well-hold-it\"\u003E3. Volume trend \u2014 building well, hold it\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EApril was a big block; May is continuing. I'm on a good ramp \u2014 the job\nnow is to peak the long mountain day, then taper the last ~10 days.\u003C/span\u003E\n\u003Ch3 id=\"4-already-strong\"\u003E4. Already strong\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EMy \u003Cstrong\u003ELes praz, Montroc, near flegere, crazy path down and back\u003C/strong\u003E day (23.6 km) is essentially\nrace distance. The mountain legs and time-on-feet exist \u2014 the gap is doing\nthat terrain at a controlled \u003Cem\u003Erun\u003C/em\u003E, and the easy/hard balance above.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003ECaveat: SRTM-based D+ under-reads short steep efforts (hill repeats) where\nthe climbs are smaller than the ~30 m DEM grid \u2014 trust Strava's D+ for those.\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "1ad8a44c0652f113dfedd47fa5cc3b5b", "console": [], "id": "pHFh", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch2 id=\"my-6-week-plan-28-june\"\u003EMy 6-week plan \u2192 28 June\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EMy shape per week: \u003Cstrong\u003E2 easy runs \u00b7 1 long mountain day \u00b7\n1 quality session \u00b7 1\u20132 rest / cross-train days.\u003C/strong\u003E The\nnon-negotiable rule \u2014 \u003Cem\u003Emy easy days are actually easy\u003C/em\u003E (Z2,\nconversational pace). That's what turns my existing volume into race\nfitness.\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='pHFh-0' random-id='97a4de3e-a952-4cb7-c0be-c0219f521eb1'\u003E\u003Cmarimo-table data-initial-value='[]' data-label='null' data-data='\u0026quot;[{\u0026#92;\u0026quot;week\u0026#92;\u0026quot;:\u0026#92;\u0026quot;W1\u0026#92;\u0026quot;,\u0026#92;\u0026quot;week_of\u0026#92;\u0026quot;:\u0026#92;\u0026quot;18 May\u0026#92;\u0026quot;,\u0026#92;\u0026quot;phase\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Build\u0026#92;\u0026quot;,\u0026#92;\u0026quot;long_day\u0026#92;\u0026quot;:\u0026#92;\u0026quot;16\u0026#92;\u0026#92;u201318 km / 1000 m, easy\u0026#92;\u0026quot;,\u0026#92;\u0026quot;quality\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Hill repeats: 6\u0026#92;\u0026#92;u20138 \u0026#92;\u0026#92;u00d7 2 min uphill hard\u0026#92;\u0026quot;,\u0026#92;\u0026quot;focus\u0026#92;\u0026quot;:\u0026#92;\u0026quot;I reset my intensity \u0026#92;\u0026#92;u2014 4 of 5 runs fully conversational (Z2).\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;week\u0026#92;\u0026quot;:\u0026#92;\u0026quot;W2\u0026#92;\u0026quot;,\u0026#92;\u0026quot;week_of\u0026#92;\u0026quot;:\u0026#92;\u0026quot;25 May\u0026#92;\u0026quot;,\u0026#92;\u0026quot;phase\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Build\u0026#92;\u0026quot;,\u0026#92;\u0026quot;long_day\u0026#92;\u0026quot;:\u0026#92;\u0026quot;20 km / 1200 m on race-type terrain\u0026#92;\u0026quot;,\u0026#92;\u0026quot;quality\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Sustained climb 20\u0026#92;\u0026#92;u201325 min at threshold\u0026#92;\u0026quot;,\u0026#92;\u0026quot;focus\u0026#92;\u0026quot;:\u0026#92;\u0026quot;I add downhill running on the long day \u0026#92;\u0026#92;u2014 controlled, not braking.\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;week\u0026#92;\u0026quot;:\u0026#92;\u0026quot;W3\u0026#92;\u0026quot;,\u0026#92;\u0026quot;week_of\u0026#92;\u0026quot;:\u0026#92;\u0026quot;01 Jun\u0026#92;\u0026quot;,\u0026#92;\u0026quot;phase\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Peak\u0026#92;\u0026quot;,\u0026#92;\u0026quot;long_day\u0026#92;\u0026quot;:\u0026#92;\u0026quot;24 km / 1400 m \u0026#92;\u0026#92;u2014 race simulation\u0026#92;\u0026quot;,\u0026#92;\u0026quot;quality\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Climb intervals when already tired (end of a medium run)\u0026#92;\u0026quot;,\u0026#92;\u0026quot;focus\u0026#92;\u0026quot;:\u0026#92;\u0026quot;My biggest week. I practise race fuelling on the long day.\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;week\u0026#92;\u0026quot;:\u0026#92;\u0026quot;W4\u0026#92;\u0026quot;,\u0026#92;\u0026quot;week_of\u0026#92;\u0026quot;:\u0026#92;\u0026quot;08 Jun\u0026#92;\u0026quot;,\u0026#92;\u0026quot;phase\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Peak\u0026#92;\u0026quot;,\u0026#92;\u0026quot;long_day\u0026#92;\u0026quot;:\u0026#92;\u0026quot;22 km / 1300 m, relaxed\u0026#92;\u0026quot;,\u0026#92;\u0026quot;quality\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Short hill repeats, stay sharp\u0026#92;\u0026quot;,\u0026#92;\u0026quot;focus\u0026#92;\u0026quot;:\u0026#92;\u0026quot;My last big week \u0026#92;\u0026#92;u2014 then volume starts coming down.\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;week\u0026#92;\u0026quot;:\u0026#92;\u0026quot;W5\u0026#92;\u0026quot;,\u0026#92;\u0026quot;week_of\u0026#92;\u0026quot;:\u0026#92;\u0026quot;15 Jun\u0026#92;\u0026quot;,\u0026#92;\u0026quot;phase\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Taper\u0026#92;\u0026quot;,\u0026#92;\u0026quot;long_day\u0026#92;\u0026quot;:\u0026#92;\u0026quot;14 km / 700 m, easy\u0026#92;\u0026quot;,\u0026#92;\u0026quot;quality\u0026#92;\u0026quot;:\u0026#92;\u0026quot;2 \u0026#92;\u0026#92;u00d7 10 min at race-climb effort\u0026#92;\u0026quot;,\u0026#92;\u0026quot;focus\u0026#92;\u0026quot;:\u0026#92;\u0026quot;I cut volume ~30 %. Legs should start feeling springy.\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;week\u0026#92;\u0026quot;:\u0026#92;\u0026quot;W6\u0026#92;\u0026quot;,\u0026#92;\u0026quot;week_of\u0026#92;\u0026quot;:\u0026#92;\u0026quot;22 Jun\u0026#92;\u0026quot;,\u0026#92;\u0026quot;phase\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Taper\u0026#92;\u0026quot;,\u0026#92;\u0026quot;long_day\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Race \u0026#92;\u0026#92;u2014 23 km du Mont-Blanc \u0026#92;\u0026#92;ud83c\u0026#92;\u0026#92;udfd4\u0026#92;\u0026#92;ufe0f\u0026#92;\u0026quot;,\u0026#92;\u0026quot;quality\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Mon/Tue: 20\u0026#92;\u0026#92;u201330 min easy + 3 short strides\u0026#92;\u0026quot;,\u0026#92;\u0026quot;focus\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Volume ~50 % down. I stay off my legs, eat well, arrive fresh.\u0026#92;\u0026quot;}]\u0026quot;' data-total-rows='6' data-total-columns='6' data-max-columns='50' data-banner-text='\u0026quot;\u0026quot;' data-pagination='false' data-page-size='10' data-field-types='[[\u0026quot;week\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]],[\u0026quot;week_of\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]],[\u0026quot;phase\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]],[\u0026quot;long_day\u0026quot;,[\
